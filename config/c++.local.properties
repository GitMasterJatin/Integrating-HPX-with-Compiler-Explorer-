# =============================================================================
# Compiler Explorer - local C++ configuration for HPX development (macOS)
#
# Place this file at:
#   compiler-explorer/etc/config/c++.local.properties
#
# Prerequisites:
#   1. HPX built and installed to HPX_INSTALL_PREFIX (default: /tmp/hpx-local)
#      See scripts/build_hpx.sh for build instructions.
#   2. Boost installed via Homebrew: brew install boost
#   3. Compiler Explorer cloned: https://github.com/compiler-explorer/compiler-explorer
# =============================================================================

# ---------------------------------------------------------------------------
# Local compiler: Apple Clang (macOS) or adapt exe= for Linux clang/gcc
# ---------------------------------------------------------------------------
compilers=&local_clang

group.local_clang.compilers=clanglocal
group.local_clang.compilerType=clang
group.local_clang.compilerCategories=clang
group.local_clang.intelAsm=-mllvm --x86-asm-syntax=intel

compiler.clanglocal.exe=/usr/bin/clang++
compiler.clanglocal.name=Apple Clang 17
compiler.clanglocal.semver=17.0.0
compiler.clanglocal.supportsExecute=true

# ---------------------------------------------------------------------------
# HPX library definition
#
# Adjust the paths below to match your HPX install prefix and Boost location.
#
# HPX_INSTALL_PREFIX  — where you ran `cmake --install` (default /tmp/hpx-local)
# BOOST_PREFIX        — Homebrew: /opt/homebrew  |  Linux: /usr
#
# Link order matters:  hpx_wrap → hpx_init → hpx_core → hpx
#
# macOS requires  -Wl,-e,_initialize_main  so that hpx_main.hpp can wrap
# main() as the HPX entry point.  On Linux use  -Wl,-wrap=main  instead.
# ---------------------------------------------------------------------------
libs=hpx

libs.hpx.name=HPX
libs.hpx.description=The C++ Standard Library for Parallelism and Concurrency
libs.hpx.url=https://hpx.stellar-group.org
libs.hpx.versions=200

libs.hpx.versions.200.version=2.0.0 (local)
libs.hpx.versions.200.path=/tmp/hpx-local/include:/opt/homebrew/include
libs.hpx.versions.200.libpath=/tmp/hpx-local/lib:/opt/homebrew/lib
libs.hpx.versions.200.liblink=hpx_wrap:hpx_init:hpx_core:hpx
libs.hpx.versions.200.options=-DHPX_APPLICATION_EXPORTS -std=c++20 -Wl,-e,_initialize_main
